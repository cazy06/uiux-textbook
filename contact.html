<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | UXデザイン体系化テキスト</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #2563EB;
      --accent-dark: #1d4ed8;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --bg-subtle: #f9fafb;
      --error: #dc2626;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.75;
      font-size: 1rem;
    }

    /* ===== Navigation ===== */
    nav {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-primary);
      text-decoration: none;
      white-space: nowrap;
      margin-right: auto;
    }

    .nav-logo:hover {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 1.5rem;
    }

    .nav-links a {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      color: var(--accent);
    }

    .nav-links a[aria-current="page"] {
      font-weight: 600;
    }

    /* ===== Main Content ===== */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    .page-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    /* ===== Form ===== */
    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    label .required {
      color: var(--error);
      margin-left: 2px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.6;
    }

    /* ===== Notice ===== */
    .notice {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.875rem 1.125rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .notice-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      margin-top: 2px;
      color: var(--accent);
    }

    /* ===== Submit Button ===== */
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-start;
    }

    .submit-btn:hover {
      background: var(--accent-dark);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    /* ===== Privacy link ===== */
    .form-footer {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .form-footer a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ===== Footer ===== */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      .nav-inner {
        gap: 1rem;
      }

      .nav-logo {
        font-size: 0.85rem;
      }

      .nav-links {
        gap: 1rem;
      }

      main {
        padding: 2rem 1rem 4rem;
      }

      .page-header h1 {
        font-size: 1.5rem;
      }

      .submit-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">UXデザイン体系化テキスト</a>
      <ul class="nav-links">
        <li><a href="index.html">ホーム</a></li>
        <li><a href="privacy-policy.html">プライバシーポリシー</a></li>
        <li><a href="contact.html" aria-current="page">お問い合わせ</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>お問い合わせ</h1>
      <p>ご質問・ご感想・誤字脱字のご指摘など、お気軽にご連絡ください。</p>
    </div>

    <form
      action="mailto:cazy06@gmail.com"
      method="POST"
      enctype="text/plain"
    >
      <div class="field">
        <label for="name">
          お名前
          <span class="required" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="name"
          name="お名前"
          placeholder="山田 太郎"
          required
          autocomplete="name"
        >
      </div>

      <div class="field">
        <label for="email">
          メールアドレス
          <span class="required" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="メールアドレス"
          placeholder="example@email.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="field">
        <label for="subject">
          件名
          <span class="required" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="subject"
          name="件名"
          placeholder="お問い合わせの件名"
          required
        >
      </div>

      <div class="field">
        <label for="message">
          メッセージ
          <span class="required" aria-hidden="true">*</span>
        </label>
        <textarea
          id="message"
          name="メッセージ"
          placeholder="ご質問・ご意見をご記入ください。"
          required
        ></textarea>
      </div>

      <div class="notice">
        <svg class="notice-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" clip-rule="evenodd"/>
        </svg>
        <span>内容を確認後、できる限り返信いたします。返信まで数日かかる場合があります。あらかじめご了承ください。</span>
      </div>

      <button type="submit" class="submit-btn">送信する</button>

      <p class="form-footer">
        送信いただいた情報は、お問い合わせへの回答にのみ使用します。
        詳しくは<a href="privacy-policy.html">プライバシーポリシー</a>をご確認ください。
      </p>
    </form>
  </main>

  <footer>
    &copy; 2026 UXデザイン体系化テキスト. All rights reserved.
  </footer>

</body>
</html>
